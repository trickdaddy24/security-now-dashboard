# Production overlay for Saltbox server (138.201.28.235)
# Usage on server: docker compose -f docker-compose.yml -f deploy/saltbox/docker-compose.production.yml up -d --build

services:
  security-now-dashboard:
    container_name: security-now-dashboard
    ports: !reset null
    env_file:
      - .env.production
    read_only: true
    tmpfs:
      - /tmp
    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 1G
    volumes:
      # Plex library — episodes appear in Plex without manual copy
      - /mnt/local/Media/grc:/data/downloads
    networks:
      - saltbox
    labels:
      traefik.enable: "true"
      traefik.docker.network: "saltbox"
      # Redirect sn.e4z.xyz → sn.aaa.stunna.xyz (keep sn-health for uptime checks)
      traefik.http.middlewares.sn-to-aaa.redirectregex.regex: "^https?://sn\\.e4z\\.xyz/(.*)"
      traefik.http.middlewares.sn-to-aaa.redirectregex.replacement: "https://sn.aaa.stunna.xyz/$${1}"
      traefik.http.middlewares.sn-to-aaa.redirectregex.permanent: "true"
      # sn.e4z.xyz — HTTP → sn.aaa.stunna.xyz
      traefik.http.routers.sn-http.entrypoints: "web"
      traefik.http.routers.sn-http.rule: "Host(`sn.e4z.xyz`)"
      traefik.http.routers.sn-http.middlewares: "globalHeaders@file,sn-to-aaa@docker,robotHeaders@file"
      traefik.http.routers.sn-http.priority: "20"
      traefik.http.routers.sn-http.service: "sn-http"
      traefik.http.services.sn-http.loadbalancer.server.port: "8787"
      # sn.e4z.xyz — HTTPS → sn.aaa.stunna.xyz
      traefik.http.routers.sn.entrypoints: "websecure"
      traefik.http.routers.sn.rule: "Host(`sn.e4z.xyz`)"
      traefik.http.routers.sn.middlewares: "globalHeaders@file,sn-to-aaa@docker,robotHeaders@file"
      traefik.http.routers.sn.priority: "20"
      traefik.http.routers.sn.service: "sn"
      traefik.http.routers.sn.tls.certresolver: "cfdns"
      traefik.http.routers.sn.tls.domains[0].main: "e4z.xyz"
      traefik.http.routers.sn.tls.domains[0].sans: "*.e4z.xyz"
      traefik.http.routers.sn.tls.options: "securetls@file"
      traefik.http.services.sn.loadbalancer.server.port: "8787"
      # sn.e4z.xyz — public health/metrics only (Uptime Kuma / Prometheus)
      traefik.http.routers.sn-health.entrypoints: "websecure"
      traefik.http.routers.sn-health.rule: "Host(`sn.e4z.xyz`) && (Path(`/health`) || Path(`/api/health`) || Path(`/metrics`))"
      traefik.http.routers.sn-health.priority: "30"
      traefik.http.routers.sn-health.service: "sn-health"
      traefik.http.routers.sn-health.tls.certresolver: "cfdns"
      traefik.http.routers.sn-health.tls.domains[0].main: "e4z.xyz"
      traefik.http.routers.sn-health.tls.domains[0].sans: "*.e4z.xyz"
      traefik.http.routers.sn-health.tls.options: "securetls@file"
      traefik.http.services.sn-health.loadbalancer.server.port: "8787"
      # sn.aaa.stunna.xyz — primary URL (Authelia SSO, same as heimdall)
      traefik.http.routers.sn-aaa-http.entrypoints: "web"
      traefik.http.routers.sn-aaa-http.rule: "Host(`sn.aaa.stunna.xyz`)"
      traefik.http.routers.sn-aaa-http.middlewares: "globalHeaders@file,redirect-to-https@docker,robotHeaders@file,authelia@docker"
      traefik.http.routers.sn-aaa-http.priority: "20"
      traefik.http.routers.sn-aaa-http.service: "sn-aaa-http"
      traefik.http.services.sn-aaa-http.loadbalancer.server.port: "8787"
      traefik.http.routers.sn-aaa.entrypoints: "websecure"
      traefik.http.routers.sn-aaa.rule: "Host(`sn.aaa.stunna.xyz`)"
      traefik.http.routers.sn-aaa.middlewares: "globalHeaders@file,secureHeaders@file,robotHeaders@file,authelia@docker"
      traefik.http.routers.sn-aaa.priority: "20"
      traefik.http.routers.sn-aaa.service: "sn-aaa"
      traefik.http.routers.sn-aaa.tls.certresolver: "cfdns"
      traefik.http.routers.sn-aaa.tls.domains[0].main: "aaa.stunna.xyz"
      traefik.http.routers.sn-aaa.tls.domains[0].sans: "*.aaa.stunna.xyz"
      traefik.http.routers.sn-aaa.tls.options: "securetls@file"
      traefik.http.services.sn-aaa.loadbalancer.server.port: "8787"
      # sn.aaa.stunna.xyz — public health (optional monitor on primary host)
      traefik.http.routers.sn-aaa-health.entrypoints: "websecure"
      traefik.http.routers.sn-aaa-health.rule: "Host(`sn.aaa.stunna.xyz`) && (Path(`/health`) || Path(`/api/health`) || Path(`/metrics`))"
      traefik.http.routers.sn-aaa-health.priority: "30"
      traefik.http.routers.sn-aaa-health.service: "sn-aaa-health"
      traefik.http.routers.sn-aaa-health.tls.certresolver: "cfdns"
      traefik.http.routers.sn-aaa-health.tls.domains[0].main: "aaa.stunna.xyz"
      traefik.http.routers.sn-aaa-health.tls.domains[0].sans: "*.aaa.stunna.xyz"
      traefik.http.routers.sn-aaa-health.tls.options: "securetls@file"
      traefik.http.services.sn-aaa-health.loadbalancer.server.port: "8787"

networks:
  saltbox:
    external: true