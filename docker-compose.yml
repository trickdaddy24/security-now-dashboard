services:
  security-now-dashboard:
    build: .
    container_name: security-now-dashboard
    restart: unless-stopped
    ports:
      - "8787:8787"
    environment:
      - SN_DOWNLOAD_DIR=/data/downloads
    volumes:
      - ./data/downloads:/data/downloads
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8787/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

# Saltbox / Traefik: remove `ports`, attach the external `saltbox` network,
# and add Traefik labels on this service (see README Deployment section).